<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="KauBru Translator — Translate English to KauBru and KauBru to English instantly." />
  <title>KauBru Translator — English ↔ Reang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo-badge">
        <span class="dot"></span>
        Reang Language Translator
      </div>
      <h1>Translate Instantly</h1>
      <p class="subtitle">English ↔ KauBru</p>
    </header>

    <!-- Card -->
    <div class="card">

      <!-- Direction Selector -->
      <div class="select-wrapper">
        <label class="select-label" for="direction">Translation Direction</label>
        <select id="direction">
          <option value="en_to_re">🇬🇧 English → KauBru</option>
          <option value="re_to_en">🌏 KauBru → English</option>
        </select>
      </div>

      <!-- Input -->
      <div class="textarea-wrapper">
        <label class="select-label" for="word">Your Text</label>
        <textarea
          id="word"
          placeholder="Type a word or sentence..."
          maxlength="500"
          oninput="updateCharCount()"
        ></textarea>
        <span class="char-count" id="charCount">0 / 500</span>
      </div>

      <!-- Translate Button -->
      <button id="translate-btn" onclick="translateWord()">
        <span class="spinner"></span>
        <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        <span class="btn-text">Translate</span>
      </button>

      <!-- Result -->
      <div id="result-box">
        <span class="result-label">Translation</span>
        <p id="result">Your translation will appear here…</p>
        <button class="copy-btn" id="copyBtn" onclick="copyResult()" title="Copy result">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>

    </div><!-- /.card -->

    <!-- Footer -->
    <footer class="page-footer">
      <p>Built with ❤️ for the Reang community &nbsp;·&nbsp; <a href="/admin">Admin Panel</a></p>
    </footer>

  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
