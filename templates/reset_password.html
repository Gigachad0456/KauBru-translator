<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create New Password — Reang Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    .auth-input { width: 100%; padding: 14px 16px; margin-bottom: 20px; background: var(--glass-strong); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 15px; outline: none; transition: border-color var(--transition), box-shadow var(--transition); box-sizing: border-box; }
    .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .form-group { width: 100%; }
    .flash-messages { margin-bottom: 20px; width: 100%; }
    .flash-error { color: #d32f2f; background: #ffebee; border-left: 4px solid #d32f2f; padding: 10px; border-radius: 4px; font-size: 14px; margin-bottom: 10px; font-weight: 500;}
    .flash-success { color: #2e7d32; background: #e8f5e9; border-left: 4px solid #2e7d32; padding: 10px; border-radius: 4px; font-size: 14px; margin-bottom: 10px; font-weight: 500;}
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo-badge">
        <span class="dot"></span> Reang Security
      </div>
      <h1>New Password</h1>
      <p class="subtitle">Secure your account</p>
    </header>

    <div class="card" style="max-width: 400px; width: 100%; padding-bottom: 24px;">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-messages">
            {% for category, message in messages %}
              <div class="flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form action="{{ url_for('auth.reset_password', token=token) }}" method="POST">
        <div class="form-group">
          <label class="select-label" for="password">New Password</label>
          <input type="password" id="password" name="password" class="auth-input" placeholder="Create a strong password" required />
        </div>

        <button type="submit" id="translate-btn" style="margin-bottom: 15px;">
          <span class="btn-text">Save New Password</span>
        </button>
      </form>
    </div>
  </div>
</body>
</html>
